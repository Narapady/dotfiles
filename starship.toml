format = """
[в•ӯв”Җ](fg:#88C0D0 bg:#00000000)[ уұ“ҹ ](fg:#D8DEE9 bg:#00000000)\
$directory\
$git_branch\
$git_status\
$docker_context\
$cmd_duration$status\
\n[в•°в”Җ](fg:#88C0D0 bg:#00000000)$character
"""
# Disable the blank line at the start of the prompt
add_newline = false

# You can also replace your username with a neat symbol like п„   or disable this
# and use the os module below
[username]
show_always = true
style_user = "fg:#88C0D0 bg:#00000000"
style_root = "fg:white bg:#00000000"
format = '[$user]($style)'
disabled = false

[status]
style = 'bg:#00000000'
symbol = '[вңҳ ](fg:#BF616A bg:#00000000)'
success_symbol = '[у°—Ў ](fg:green bg:#00000000)'
format = '[[$signal_name ](fg:#BF616A bg:#00000000)$symbol]($style)'
map_symbol = false
disabled = false

[character]
success_symbol = '[п‘ ](fg:#88C0D0 bg:#00000000)'
error_symbol = '[вңҳ](fg:#BF616A)'

[cmd_duration]
min_time = 1
style = 'bold bg:#00000000 fg:#BF616A'
format = '[ пү’ [$duration](bold fg:#D8DEE9 bg:#00000000)]($style)'

[hostname]
ssh_only = false
style = 'fg:white bg:#00000000'
format = '[@$hostname]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:#00000000"
disabled = true # Disabled by default

[directory]
style = "bold fg:#88C0D0 bg:#00000000"
format = "[$path]($style)"
truncation_length = 9
truncation_symbol = " вҖҰ/"
truncate_to_repo = true
home_symbol = '~'

[docker_context]
symbol = "у°ЎЁ"
style = "(fg:#88C0D0 bg:#00000000)"
format = '[ $symbol $context ]($style) $path'

[git_branch]
style = "fg:#D8DEE9 bg:#00000000"
format = '[ о«ј ](fg:#D8DEE9 bg:#00000000)[$branch ](bold $style)'
truncation_length = 15

[git_status]
style = "fg:#957fb8 bg:#00000000"
conflicted = "~"
up_to_date =  '[ уұ“Һ ](fg:#8FBCBB bg:#00000000)'
untracked = "[ п„Ё ${count}](fg:#7E9cd8 bg:#00000000)"
ahead = "[ пҗғ ${count}](fg:#8FBCBB bg:#00000000)"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "[пҗі ${count}](fg:#8FBCBB bg:#00000000)"
stashed = "*"
modified = '[пҒ„ $count ](fg:#EBCB8B bg:#00000000)'
staged = '[пҶ– $count](fg:#A3BE8C bg:#00000000)'
renamed = "пҒ„ "
deleted = "[пҖ” ${count} ](fg:#BF616A bg:#00000000)"
format = '[$all_status$ahead_behind](bold $style)'
# format = '[$modified]()[$untracked]()[$ahead_behind]()[$staged]()[$deleted]()'

[python]
python_binary = ["./venv/bin/python", "./.venv/bin/python", "python3", "python", "python2"]
symbol = 'оҲө '
pyenv_version_name = true
style = "fg:#7aa89f bg:#00000000"
format = '[ $symbol ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bold bg:#00000000 fg:#BF616A"
format = '[$time ]($style)'
