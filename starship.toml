format = """
в•ӯв”Җ[оӮ¶](fg:#151515 bg:#00000000)[уұ“ҹ ](fg:#FFA066 bg:#151515)\
$username\
$directory\
$git_branch\
$git_status\
$cmd_duration[оӮҙ](fg:#151515 bg:#00000000)\
\nв•°в”Җ$character
"""
# Disable the blank line at the start of the prompt
add_newline = false

# You can also replace your username with a neat symbol like п„   or disable this
# and use the os module below
[username]
show_always = true
style_user = "fg:#7E9CD8 bg:#151515"
style_root = "fg:white bg:#151515"
format = '[$user]($style)'
disabled = false

[status]
style = 'bg:#151515'
symbol = '[вңҳ ](fg:red bg:#151515)'
success_symbol = '[вң” ](fg:green bg:#151515)'
format = '[[$signal_name ](fg:red bg:#151515)$symbol]($style)'
map_symbol = false
disabled = false

[character]
success_symbol = '[вқҜ](bold green)'
error_symbol = '[вңҳ](fg:red)'

[cmd_duration]
min_time = 1
style = 'bg:#151515 fg:#E82424'
format = '[ took [$duration](bold fg:#909090 bg:#151515) пү’ ]($style)'

[hostname]
ssh_only = false
style = 'fg:white bg:#151515'
format = '[@$hostname]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:#151515"
disabled = true # Disabled by default

[directory]
style = "fg:#6A9589 bg:#151515"
format = "[ п’Ӯ $path]($style)"
truncation_length = 9
# truncation_symbol = " вҖҰ/"
truncate_to_repo = true
home_symbol = '~'

[docker_context]
symbol = "оһ° "
style = "bg:#151515"
format = '[ $symbol $context ]($style) $path'

[git_branch]
style = "fg:#E46876 bg:#151515"
format = '[ оӮ  ](fg:#E46876 bg:#151515)[$branch ](bold $style)'
truncation_length = 15

[git_status]
style = "fg:#957fb8 bg:#151515"
conflicted = "~"
up_to_date =  '[п…Ҡ ](fg:#6a9589 bg:#151515)'
untracked = "[ п„Ё ${count}](fg:#7E9cd8 bg:#151515)"
ahead = "[ пҗғ ${count}](fg:#6a9589 bg:#151515)"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "[пҗі ${count}](fg:#6a9589 bg:#151515)"
stashed = "*"
modified = '[пҒ„ $count ](fg:#ffa066 bg:#151515)'
staged = '[пҶ– $count](fg:#98BB6C bg:#151515)'
renamed = "пҒ„ "
deleted = "[пҖ” ${count} ](fg:#E82424 bg:#151515)"
format = '[$all_status$ahead_behind]($style)'
# format = '[$modified]()[$untracked]()[$ahead_behind]()[$staged]()[$deleted]()'

[python]
python_binary = ["./venv/bin/python", "./.venv/bin/python", "python3", "python", "python2"]
symbol = 'оҲө '
style = "fg:#7aa89f bg:#151515"
format = '[ $symbol ]($style)'


[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#151515 fg:#E82424"
format = '[$time ]($style)'
