format = """
в•ӯв”Җ[ уұ“ҹ  ](fg:#FFA066 bg:#00000000)\
$username\
[ п„Ғ ](bg:#00000000 fg:#E82424)\
$directory\
$git_branch\
$git_status\
$cmd_duration\
\nв•°в”Җ$character
"""
# Disable the blank line at the start of the prompt
add_newline = false

# You can also replace your username with a neat symbol like п„   or disable this
# and use the os module below
[username]
show_always = true
style_user = "fg:#7E9CD8 bg:#00000000"
style_root = "fg:white bg:#00000000"
format = '[$user]($style)'
disabled = false

[status]
style = 'bg:#00000000'
symbol = '[вңҳ ](fg:red bg:#00000000)'
success_symbol = '[вң” ](fg:green bg:#00000000)'
format = '[[$signal_name ](fg:red bg:#00000000)$symbol]($style)'
map_symbol = false
disabled = false

[character]
success_symbol = '[вқҜ](bold green)'
error_symbol = '[вңҳ](fg:red)'

[cmd_duration]
min_time = 1
style = 'bg:#00000000 fg:#E82424'
format = '[ п„Ғ took [$duration](bold fg:#909090 bg:#00000000) пү’ ]($style)'

[hostname]
ssh_only = false
style = 'fg:white bg:#00000000'
format = '[@$hostname]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:#00000000"
disabled = true # Disabled by default

[directory]
style = "fg:#6A9589 bg:#00000000"
format = "[ п’Ӯ $path]($style)"
truncation_length = 9
truncation_symbol = " вҖҰ/"
truncate_to_repo = true
home_symbol = '~'

[docker_context]
symbol = "оһ° "
style = "bg:#00000000"
format = '[ $symbol $context ]($style) $path'

[git_branch]
style = "fg:#E46876 bg:#00000000"
format = '[ п„Ғ  ](fg:#E82424 bg:#00000000)[оӮ  ](fg:#E46876 bg:#00000000)[$branch ](bold $style)'
truncation_length = 15

[git_status]
style = "fg:#957fb8 bg:#00000000"
conflicted = "~"
up_to_date =  '[п…Ҡ ](fg:#6a9589 bg:#00000000)'
untracked = "[о¬І](fg:#7E9cd8 bg:#00000000)"
ahead = "[пҗғ +${count}](fg:#6a9589 bg:#00000000)"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "[пҗі -${count}](fg:#6a9589 bg:#00000000)"
stashed = "*"
modified = '[пҒ„ ](fg:#E6C384 bg:#00000000)'
staged = '[пҶ– \($count\) ](fg:#ffa066 bg:#00000000)'
renamed = "пҒ„ "
deleted = "[пҖ”](fg:#E82424 bg:#00000000)"
# format = '[$all_status$ahead_behind ]($style)'
format = '[$modified ]()[$untracked ]()[$ahead_behind ]()[$staged ]()[$deleted]()'

[python]
python_binary = ["./venv/bin/python", "./.venv/bin/python", "python3", "python", "python2"]
symbol = 'оҲө '
style = "fg:#7aa89f bg:#00000000"
format = '[ $symbol ]($style)'


[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#00000000 fg:#E82424"
format = '[$time ]($style)'
